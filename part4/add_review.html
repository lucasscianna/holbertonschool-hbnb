<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Add Review</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="index.html"><img src="images/logo.png" alt="HBnB Logo" class="logo"></a>
        <nav id="nav-links">
            <a href="login.html" class="login-button" id="login-link">Login</a>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2>Add Review for <span id="place-name-display">Place</span></h2>
            <form id="review-form" class="add-review form">
                <input type="hidden" id="place-id" value="">
                <div class="form-group">
                    <label for="review-text">Your Comment</label>
                    <textarea id="review-text" rows="5" required placeholder="Describe your experience..."></textarea>
                </div>
                <div class="form-group">
                    <label for="review-rating">Rating</label>
                    <select id="review-rating" required>
                        <option value="5">5 - Excellent</option>
                        <option value="4">4 - Very Good</option>
                        <option value="3">3 - Good</option>
                        <option value="2">2 - Fair</option>
                        <option value="1">1 - Poor</option>
                    </select>
                </div>
                <button type="submit" class="submit-button">Submit Review</button>
                <p id="review-error" style="color: red; margin-top: 15px; display: none;"></p>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
    <script src="scripts/review.js"></script>
</body>
</html>
